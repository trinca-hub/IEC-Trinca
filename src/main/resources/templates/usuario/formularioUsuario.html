<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>
</head>
<body>
    <h1 style="text-align: center;">Cadastro de Usuários</h1>
    <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="nomeUsuario">Nome:</label>
        <input type="text" id="nomeUsuario" name="nomeUsuario" th:field="*{nomeUsuario}" required>
        <br />
        <label for="emailUsuario">Email:</label>
        <input type="email" id="emailUsuario" name="emailUsuario" th:field="*{emailUsuario}" required>
        <br />
        <label for="loginUsuario">Login:</label>
        <input type="text" id="loginUsuario" name="loginUsuario" th:field="*{loginUsuario}" required>
        <br />
        <label for="senhaUsuario">Senha:</label>
        <input type="password" id="senhaUsuario" name="senhaUsuario" th:field="*{senhaUsuario}" required>
        <br />
        <button type="submit">Salvar</button>
    </form>
</body>
</html>
