<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Disciplinas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
    <h1>Lista de Disciplinas</h1>
    <div class="page-actions">
        <a class="btn-link" href="/disciplinas/criar">Criar nova disciplina</a>
        <a class="btn-link secondary" href="/">Voltar à página inicial</a>
    </div>
    <table>
     <tr>
        <th>Nome</th>
        <th>Sigla</th>
        <th>Carga Horária</th>
        <th colspan="2">Ações</th>
    </tr>
    <tr th:each="disciplina : ${disciplinas}">
        <td th:text="${disciplina.nomeDisciplina}">*</td>
        <td th:text="${disciplina.siglaDisciplina}">*</td>
        <td th:text="${disciplina.carga_horariaDisciplina}">*</td>
        <td>
            <a th:href="@{/disciplinas/editar/{id}(id=${disciplina.idDisciplina})}">Editar</a>
            <a th:href="@{/disciplinas/excluir/{id}(id=${disciplina.idDisciplina})}">Excluir</a>
        </td>
    </tr>
    </table>
</body>
</html>
