<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Professores</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
    <h1>Cadastro de Professores</h1>
    <form th:action="@{/professores/salvar}" method="post" th:object="${professor}">

        <input type="hidden" th:field="*{id}">

        <label>Nome:</label>
        <input type="text" th:field="*{nomeProfessor}">
        <br />
        <label>Telefone:</label>
        <input type="text" th:field="*{telefoneProfessor}">
        <br />
        <label>Graduação:</label>
        <input type="text" th:field="*{graduacaoProfessor}">
        <br />
        <label>RM:</label>
        <input type="text" th:field="*{rmProfessor}">
        <br />

        <input type="submit" value="Salvar">
    </form>
    <div class="page-actions">
        <a class="btn-link secondary" href="/">Voltar à página inicial</a>
    </div>
</body>
</html>
