<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Alunos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
    <h1>Lista de Alunos</h1>
    <div class="page-actions">
        <a class="btn-link" href="/alunos/criar">Criar novo aluno</a>
        <a class="btn-link secondary" href="/">Voltar à página inicial</a>
    </div>
    <table>
     <tr>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Endereço</th>
        <th>Telefone</th>
        <th>CPF</th>
        <th>RA</th>
        <th colspan="2">Ações</th>
    </tr>
    <tr th:each="aluno : ${alunos}">
        <td th:text="${aluno.nomeAluno}">*</td>
        <td th:text="${aluno.emailAluno}">*</td>
        <td th:text="${aluno.enderecoAluno}">*</td>
        <td th:text="${aluno.telefoneAluno}">*</td>
        <td th:text="${aluno.cpfAluno}">*</td>
        <td th:text="${aluno.raAluno}">*</td>
        <td>
            <a th:href="@{/alunos/editar/{id}(id=${aluno.idAluno})}">Editar</a>
            <a th:href="@{/alunos/excluir/{id}(id=${aluno.idAluno})}">Excluir</a>
        </td>
    </tr>
    </table>
</body>
</html>
